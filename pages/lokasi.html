<section class="container">

        <!-- Bagian Teks -->
        <div class="text-section">
            <h1>Lokasi <span class="highlight">Heya Camp?</span></h1>
            <p>
                Heya Camp Berlokasi di Gg Cempaka, Desa Bandar, Kec. Bandar, Kabupaten Batang, Jawa Tengah 51254.
            </p>
        </div>

        <!-- Bagian Maps Slider -->
        <div class="image-section">
            <div class="slider-container" id="maps-slider">
                <div class="slider-track" id="slider-track">
                    <!-- Slide 1: Lokasi Utama -->
                    <div class="slide">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3959.823327757563!2d109.79656695757778!3d-7.03004179023393!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e70170b78f793c3%3A0x2c8c3509d179750f!2sPerentalan%20Alat%20Outdoor%20Heya%20Camp!5e0!3m2!1sid!2sid!4v1777998387076!5m2!1sid!2sid" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                    <!-- Slide 2: Contoh Lokasi Lain (Opsional) -->
                    <div class="slide">
                        <iframe src="https://www.google.com/maps/embed?pb=!4v1778000706914!6m8!1m7!1ss5HSsAjszIyiUbAMa03oyw!2m2!1d-7.029648387723042!2d109.796889807507!3f190.53148349973702!4f-0.21839462116672337!5f0.7820865974627469" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>

                <!-- Tombol Navigasi -->
                <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
                <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>

                <div class="dots-container">
                    <span class="dot active" onclick="currentSlide(0)"></span>
                    <span class="dot" onclick="currentSlide(1)"></span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Tambahkan Script di akhir body -->
<script>
    let currentIndex = 0;
    const track = document.getElementById('slider-track');
    const dots = document.querySelectorAll('.dot');

    function moveSlide(direction) {
        const slides = document.querySelectorAll('.slide');
        currentIndex = (currentIndex + direction + slides.length) % slides.length;
        updateSlider();
    }

    function currentSlide(index) {
        currentIndex = index;
        updateSlider();
    }

    function updateSlider() {
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        dots.forEach((dot, index) => {
            dot.classList.toggle('active', index === currentIndex);
        });
    }
</script>

</body>
